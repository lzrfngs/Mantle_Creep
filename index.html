<!DOCTYPE html>
<!--
  Murakami Pattern Generator
  ──────────────────────────
  Inspired by A.A. Murakami's "A Thousand Layers of Stomach" and the
  pigmentation patterns of the Asari clam (Ruditapes philippinarum).

  Technique: Meinhardt activator-inhibitor-substrate reaction-diffusion.
  A 1D array of cells represents the mollusc's mantle edge. Each timestep
  advances the chemistry using coupled PDEs and writes one row of pixels.
  The 2D image accumulates top-to-bottom — identical to how the shell itself
  deposits pigment during growth. Chevron patterns emerge from lateral
  travelling waves along the simulated mantle edge.

  Equations (forward Euler, wrapped boundary):
    da = dt * ( c·a²·s/h  −  μa·a  +  Da·∇²a  +  ρ  )
    dh = dt * ( c·a²·s    −  μh·h  +  Dh·∇²h        )
    ds = dt * ( ρs         −  a²·s  −  μs·s          )

  Reference: Meinhardt, H. (1995). The Algorithmic Beauty of Sea Shells.

  Stack: vanilla JS + Canvas 2D API. No libraries.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MURAKAMI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0c0c0c; overflow: hidden; }

body {
  display: flex;
  font-family: 'IBM Plex Mono', ui-monospace, 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.07em;
  color: #888;
}

#app { display: flex; width: 100%; height: 100%; }

#panel {
  width: 220px;
  min-width: 220px;
  background: #111;
  border-right: 1px solid #1c1c1c;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
}
#panel::-webkit-scrollbar { display: none; }

.panel-title {
  padding: 16px 14px 12px;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: #555;
  border-bottom: 1px solid #1a1a1a;
  text-transform: uppercase;
  flex-shrink: 0;
}

.section {
  padding: 10px 14px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: #555;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 8px;
}
.slider-row:last-child { margin-bottom: 0; }

.slider-label {
  width: 76px;
  min-width: 76px;
  font-size: 9px;
  letter-spacing: 0.08em;
  color: #666;
  text-transform: uppercase;
}

input[type="range"] {
  -webkit-appearance: none;
  flex: 1;
  min-width: 0;
  height: 1px;
  background: #282828;
  outline: none;
  border: none;
  cursor: pointer;
  border-radius: 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 9px; height: 9px;
  background: #666;
  border-radius: 0;
  cursor: pointer;
  transition: background 0.1s;
}
input[type="range"]::-webkit-slider-thumb:hover,
input[type="range"]:hover::-webkit-slider-thumb { background: #ccc; }
input[type="range"]::-moz-range-thumb {
  width: 9px; height: 9px;
  background: #666; border-radius: 0; border: none; cursor: pointer;
}

.slider-val {
  width: 36px;
  text-align: right;
  font-size: 9px;
  color: #555;
  flex-shrink: 0;
}

.toggle-row {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; user-select: none; margin-bottom: 8px;
}
.toggle-row:last-child { margin-bottom: 0; }
.dot {
  width: 5px; height: 5px;
  border: 1px solid #333; border-radius: 50%;
  flex-shrink: 0; transition: background 0.1s, border-color 0.1s;
}
.toggle-row.on .dot { background: #aaa; border-color: #aaa; }
.toggle-label { font-size: 9px; letter-spacing: 0.1em; color: #666; text-transform: uppercase; }
.toggle-row.on .toggle-label { color: #bbb; }

.colour-pickers {
  display: flex; gap: 10px;
  margin-top: 8px;
  opacity: 0.2; pointer-events: none; transition: opacity 0.2s;
}
.colour-pickers.on { opacity: 1; pointer-events: all; }

.swatch-group { display: flex; flex-direction: column; gap: 3px; align-items: flex-start; }
.swatch-label { font-size: 8px; letter-spacing: 0.15em; color: #444; text-transform: uppercase; }
input[type="color"] {
  -webkit-appearance: none;
  width: 34px; height: 20px;
  border: 1px solid #282828; padding: 1px;
  background: #181818; cursor: pointer; border-radius: 0;
}
input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
input[type="color"]::-webkit-color-swatch { border: none; }

.btn {
  display: block; width: 100%;
  padding: 9px 0;
  background: none; border: 1px solid #222;
  color: #666; font-family: inherit; font-size: 9px;
  letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; transition: border-color 0.15s, color 0.15s;
  margin-bottom: 6px;
}
.btn:last-child { margin-bottom: 0; }
.btn:hover { border-color: #555; color: #bbb; }
.btn:active { background: #161616; }
.btn.accent { border-color: #2a2a2a; color: #777; }
.btn.accent:hover { border-color: #888; color: #eee; }

#canvas-container {
  flex: 1; display: flex;
  align-items: center; justify-content: center;
  background: #0c0c0c;
}
#glcanvas {
  display: block;
  max-width: min(calc(100vw - 220px - 40px), calc(100vh - 40px));
  max-height: min(calc(100vw - 220px - 40px), calc(100vh - 40px));
  width: 100%; aspect-ratio: 1 / 1;
}
</style>
</head>
<body>
<div id="app">
  <aside id="panel">
    <div class="panel-title">Murakami</div>
  </aside>
  <main id="canvas-container">
    <canvas id="glcanvas"></canvas>
  </main>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────────────────
// SIMULATION — Meinhardt activator-inhibitor-substrate reaction-diffusion
//
// Three chemical species on the mollusc mantle edge:
//   a[i] — activator  (autocatalytic; high where pigment is deposited)
//   h[i] — inhibitor  (activated by a, suppresses a at range)
//   s[i] — substrate  (consumed by production; local depletion drives complexity)
//
// Equations (forward Euler, wrapped boundary):
//   prod = a²·s / (h · (1 + 0.1·a²))   ← saturation term prevents blowup
//   na   = a + dt·( Da·∇²a  +  c·prod  −  μa·a  +  ρa )
//   nh   = h + dt·( Dh·∇²h  +  c·a²·s  −  μh·h        )
//   ns   = s + dt·( ρs      −  c·a²·s  −  μs·s         )
//
// The substrate s is what produces the complex reference behaviour. As it
// depletes locally, stripes thin, merge, and bifurcate. rho_s controls how
// quickly it replenishes: lower = more chaotic, higher = cleaner stripes.
//
// Reference: Meinhardt, H. (1995). The Algorithmic Beauty of Sea Shells.
// ─────────────────────────────────────────────────────────────────────────────
class SimRunner {
  constructor(canvas) {
    this.displayCanvas = canvas;
    this.dctx = canvas.getContext('2d');

    this.SIZE = 1024; // width of simulation = width and height of output image

    // Offscreen canvas accumulates rows (never cleared until reset)
    this.offscreen        = document.createElement('canvas');
    this.offscreen.width  = this.SIZE;
    this.offscreen.height = this.SIZE;
    this.octx = this.offscreen.getContext('2d');

    // Double-buffered Float64 arrays — three chemical species
    this.a  = new Float64Array(this.SIZE);
    this.h  = new Float64Array(this.SIZE);
    this.s  = new Float64Array(this.SIZE);
    this.na = new Float64Array(this.SIZE); // scratch buffers for next state
    this.nh = new Float64Array(this.SIZE);
    this.ns = new Float64Array(this.SIZE);

    // Reusable ImageData for writing one row at a time
    this.rowBuf = this.octx.createImageData(this.SIZE, 1);

    // ── User-controllable parameters ─────────────────────────────────────────
    this.Da        = 0.0025; // activator diffusion
    this.Dh        = 0.1;    // inhibitor diffusion (must exceed Da)
    this.rho_s     = 0.15;   // substrate replenishment rate
    this.threshold = 1.2;    // display cutoff: a > threshold → foreground color
    this.speed     = 4;      // rows computed per animation frame (1–20)

    // ── Fixed kinetic parameters ──────────────────────────────────────────────
    this.c     = 0.01;
    this.mu_a  = 0.003;
    this.mu_h  = 0.004;
    this.rho_a = 0.0002;
    this.mu_s  = 0.0;
    this.dt    = 0.5;

    // ── Display colors (RGB byte triples) ─────────────────────────────────────
    this.colorBG = [13, 13, 13];      // below threshold — dark background
    this.colorFG = [237, 232, 224];   // above threshold — warm light marks

    this.running    = true;
    this.currentRow = 0;

    this._reset();
    this._resize();
    window.addEventListener('resize', () => this._resize());
  }

  // ── Resize display canvas to fit container ───────────────────────────────
  _resize() {
    const c = this.displayCanvas.parentElement;
    const s = Math.min(c.clientWidth, c.clientHeight) - 24;
    this.displayCanvas.width  = s;
    this.displayCanvas.height = s;
    this._draw(); // redraw from offscreen after backing-store clear
  }

  // ── Initialise state arrays and clear offscreen canvas ───────────────────
  _reset() {
    const N = this.SIZE;
    const a = this.a, h = this.h, s = this.s;

    for (let i = 0; i < N; i++) {
      a[i] = 1.0 + (Math.random() * 2 - 1) * 0.1;
      h[i] = 1.0 + (Math.random() * 2 - 1) * 0.05;
      s[i] = 1.0;
    }

    this.currentRow = 0;
    const [r, g, b] = this.colorBG;
    this.octx.fillStyle = `rgb(${r},${g},${b})`;
    this.octx.fillRect(0, 0, N, N);
  }

  // ── Advance simulation one row and write pixels ───────────────────────────
  _step() {
    const N = this.SIZE;
    const { Da, Dh, c, mu_a, mu_h, rho_a, rho_s, mu_s, dt, threshold } = this;
    const a = this.a, h = this.h, s = this.s;
    const na = this.na, nh = this.nh, ns = this.ns;
    const rd = this.rowBuf.data;
    const [bgR, bgG, bgB] = this.colorBG;
    const [fgR, fgG, fgB] = this.colorFG;

    for (let i = 0; i < N; i++) {
      const L = i === 0     ? N - 1 : i - 1;
      const R = i === N - 1 ? 0     : i + 1;

      const ai = a[i], hi = h[i], si = s[i];
      const lapA = a[L] - 2*ai + a[R];
      const lapH = h[L] - 2*hi + h[R];

      // Saturating autocatalysis — the (1 + 0.1·a²) denominator caps production
      // when activator is high, preventing blowup while preserving Turing instability
      const prod = ai * ai * si / (hi * (1 + 0.1 * ai * ai));

      na[i] = ai + dt * (Da * lapA + c * prod - mu_a * ai + rho_a);
      nh[i] = hi + dt * (Dh * lapH + c * ai * ai * si - mu_h * hi);
      ns[i] = si + dt * (rho_s - c * ai * ai * si - mu_s * si);

      na[i] = Math.max(0.001, Math.min(10, na[i]));
      nh[i] = Math.max(0.001, Math.min(10, nh[i]));
      ns[i] = Math.max(0,     Math.min(5,  ns[i]));
    }

    // Write this row to the ImageData buffer
    for (let i = 0; i < N; i++) {
      const px = i << 2;
      if (na[i] > threshold) {
        rd[px] = fgR; rd[px+1] = fgG; rd[px+2] = fgB;
      } else {
        rd[px] = bgR; rd[px+1] = bgG; rd[px+2] = bgB;
      }
      rd[px+3] = 255;
    }
    this.octx.putImageData(this.rowBuf, 0, this.currentRow);

    // Swap buffers — no allocation
    [this.a, this.na] = [this.na, this.a];
    [this.h, this.nh] = [this.nh, this.h];
    [this.s, this.ns] = [this.ns, this.s];

    this.currentRow++;
    if (this.currentRow >= this.SIZE) this._reset();
  }

  // ── Scale offscreen to display canvas ────────────────────────────────────
  _draw() {
    this.dctx.drawImage(
      this.offscreen,
      0, 0, this.displayCanvas.width, this.displayCanvas.height
    );
  }

  // ── Animation tick: advance `speed` rows then redraw ─────────────────────
  tick() {
    if (this.running) {
      for (let i = 0; i < this.speed; i++) this._step();
    }
    this._draw();
  }

  // ── Public controls ───────────────────────────────────────────────────────
  newSeed() {
    this._reset();
  }

  // Set a named parameter directly on this object (all params are top-level props)
  setParam(key, value) {
    this[key] = value;
  }

  // Update display colors. If enabled, use picker hex values; else revert to defaults.
  setColor(enabled, hexA, hexB) {
    if (!enabled) {
      this.colorBG = [13, 13, 13];
      this.colorFG = [237, 232, 224];
    } else {
      if (hexA) this.colorBG = this._hexToRgb(hexA);
      if (hexB) this.colorFG = this._hexToRgb(hexB);
    }
  }

  _hexToRgb(hex) {
    return [
      parseInt(hex.slice(1, 3), 16),
      parseInt(hex.slice(3, 5), 16),
      parseInt(hex.slice(5, 7), 16),
    ];
  }

  // Export the current 1024×1024 offscreen canvas as PNG
  exportPNG() {
    const link = document.createElement('a');
    link.download = 'murakami-' + Date.now() + '.png';
    link.href = this.offscreen.toDataURL('image/png');
    link.click();
  }
}


// ─────────────────────────────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────────────────────────────
class UI {
  constructor(panel, sim) {
    this.panel        = panel;
    this.sim          = sim;
    this.colorEnabled = false;
    this._build();
  }

  _build() {
    this._buildSimulation();
    this._buildColor();
    this._buildButtons();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  _section(label) {
    const sec = document.createElement('div');
    sec.className = 'section';
    if (label) {
      const l = document.createElement('div');
      l.className = 'section-label';
      l.textContent = label;
      sec.appendChild(l);
    }
    this.panel.appendChild(sec);
    return sec;
  }

  // fmt(n): formats the display value. onChange(n): called on slider input.
  _slider(container, label, min, max, step, val, onChange, fmt) {
    const row = document.createElement('div');
    row.className = 'slider-row';

    const l = document.createElement('div');
    l.className = 'slider-label';
    l.textContent = label;

    const inp = document.createElement('input');
    inp.type = 'range';
    inp.min = min; inp.max = max; inp.step = step; inp.value = val;

    const v = document.createElement('div');
    v.className = 'slider-val';
    v.textContent = fmt(parseFloat(val));

    inp.addEventListener('input', () => {
      const n = parseFloat(inp.value);
      v.textContent = fmt(n);
      onChange(n);
    });

    row.appendChild(l); row.appendChild(inp); row.appendChild(v);
    container.appendChild(row);
    return inp;
  }

  _toggle(container, label, initial, onChange) {
    const row = document.createElement('div');
    row.className = 'toggle-row' + (initial ? ' on' : '');
    const d = document.createElement('div'); d.className = 'dot';
    const l = document.createElement('div'); l.className = 'toggle-label'; l.textContent = label;
    row.appendChild(d); row.appendChild(l);
    let state = initial;
    row.addEventListener('click', () => {
      state = !state;
      row.classList.toggle('on', state);
      onChange(state);
    });
    container.appendChild(row);
  }

  // ── Simulation section ────────────────────────────────────────────────────
  _buildSimulation() {
    const sec = this._section('Simulation');

    // Da — activator diffusion. Lower = finer, denser stripes.
    this._slider(sec, 'Da', 0.001, 0.008, 0.0001, 0.0025,
      v => this.sim.setParam('Da', v),
      v => v.toFixed(4)
    );

    // Dh — inhibitor diffusion. Must exceed Da for Turing instability.
    this._slider(sec, 'Dh', 0.05, 0.3, 0.005, 0.1,
      v => this.sim.setParam('Dh', v),
      v => v.toFixed(3)
    );

    // Substrate — replenishment rate of s. Lower = more chaotic, irregular stripes.
    // Higher = cleaner, more regular stripes.
    this._slider(sec, 'Substrate', 0.05, 0.4, 0.005, 0.15,
      v => this.sim.setParam('rho_s', v),
      v => v.toFixed(3)
    );

    // Threshold — display cutoff on activator concentration.
    this._slider(sec, 'Threshold', 0.8, 2.5, 0.05, 1.2,
      v => this.sim.setParam('threshold', v),
      v => v.toFixed(2)
    );

    // Speed — rows computed per frame.
    this._slider(sec, 'Speed', 1, 20, 1, 4,
      v => this.sim.setParam('speed', v),
      v => String(Math.round(v))
    );
  }

  // ── Colour section ────────────────────────────────────────────────────────
  _buildColor() {
    const sec = this._section('Colour');

    const toggle = document.createElement('div');
    toggle.className = 'toggle-row';
    const d = document.createElement('div'); d.className = 'dot';
    const l = document.createElement('div'); l.className = 'toggle-label'; l.textContent = 'Enable';
    toggle.appendChild(d); toggle.appendChild(l);

    const pickers = document.createElement('div');
    pickers.className = 'colour-pickers';

    const bgGroup = document.createElement('div'); bgGroup.className = 'swatch-group';
    bgGroup.innerHTML = '<div class="swatch-label">BG</div>';
    this.pickerA = document.createElement('input');
    this.pickerA.type = 'color'; this.pickerA.value = '#0d0d0d';
    bgGroup.appendChild(this.pickerA);

    const fgGroup = document.createElement('div'); fgGroup.className = 'swatch-group';
    fgGroup.innerHTML = '<div class="swatch-label">FG</div>';
    this.pickerB = document.createElement('input');
    this.pickerB.type = 'color'; this.pickerB.value = '#ede8e0';
    fgGroup.appendChild(this.pickerB);

    pickers.appendChild(bgGroup); pickers.appendChild(fgGroup);

    toggle.addEventListener('click', () => {
      this.colorEnabled = !this.colorEnabled;
      toggle.classList.toggle('on', this.colorEnabled);
      pickers.classList.toggle('on', this.colorEnabled);
      this.sim.setColor(this.colorEnabled, this.pickerA.value, this.pickerB.value);
    });

    const update = () => {
      if (this.colorEnabled) this.sim.setColor(true, this.pickerA.value, this.pickerB.value);
    };
    this.pickerA.addEventListener('input', update);
    this.pickerB.addEventListener('input', update);

    sec.appendChild(toggle); sec.appendChild(pickers);
  }

  // ── Buttons ───────────────────────────────────────────────────────────────
  _buildButtons() {
    const sec = this._section(null);

    const pause = document.createElement('button');
    pause.className = 'btn';
    pause.textContent = 'Pause / Resume';
    pause.addEventListener('click', () => { this.sim.running = !this.sim.running; });

    const seed = document.createElement('button');
    seed.className = 'btn';
    seed.textContent = 'New Seed';
    seed.addEventListener('click', () => this.sim.newSeed());

    const exp = document.createElement('button');
    exp.className = 'btn accent';
    exp.textContent = 'Export PNG';
    exp.addEventListener('click', () => this.sim.exportPNG());

    sec.appendChild(pause); sec.appendChild(seed); sec.appendChild(exp);
  }
}


// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
function init() {
  const sim = new SimRunner(document.getElementById('glcanvas'));
  new UI(document.getElementById('panel'), sim);
  const loop = () => { sim.tick(); requestAnimationFrame(loop); };
  requestAnimationFrame(loop);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
